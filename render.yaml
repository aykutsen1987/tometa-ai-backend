# Render deployment configuration
# Bu dosyayı projenin köküne koy, Render otomatik tanır.

services:
  - type: web
    name: tometa-ai-proxy
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health

    # Environment Variables → Render Dashboard'dan ekle:
    # APP_SECRET      = güçlü bir şifre (en az 32 karakter)
    # GEMINI_API_KEY  = Google AI Studio'dan al
    # GROQ_API_KEY    = Groq Console'dan al
